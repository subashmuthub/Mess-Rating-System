<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="campus_navigation_system">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Campus Navigation System</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    /* Hide Google Maps development watermark */
    .gm-style-cc,
    .gm-style-cc + div,
    .gmnoprint,
    div[style*="background-color: rgba(0, 0, 0, 0.45)"],
    div[style*="For development purposes only"] {
      display: none !important;
    }
    
    /* Hide development watermark text */
    a[href^="https://developers.google.com/maps/documentation/javascript/"],
    img[src*="transparent"],
    [title="Report errors in the road map or imagery to Google"] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <h2>Loading Campus Navigation System...</h2>
  </div>
  <!-- Google Maps JavaScript API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuIqJNPhKBbQR1GQZeReQHcle235Z_K_4"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
